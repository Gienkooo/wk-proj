data:
  name: scene_json
  image_size: 256
  channels: 3
  num_samples: 0
  num_shapes: 0
  num_colors: 0
  num_materials: 0
  batch_size: 128
  num_workers: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  root: dataset_50k
  split_path: data/splits/rotation_ood_50k.json
  metadata_glob: "*_metadata.json"
  image_ext: ".png"
  rotation_unit_override: null
  enforce_single_object: true
model:
  name: recurrent_cvt
  embed_dim: 64
  depth: 4
  num_heads: 2
  mlp_ratio: 2.0
  dropout: 0.1
  tokenizer_kernel: 7
  tokenizer_stride: 4
  recurrent_steps: 1
  use_cls_token: true
train:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0001
  seed: 42
  device: cuda
  amp: true
  log_interval: 5
  loss_weights:
    shape: 1
    color: 1
    material: 1
    pos: 1
    rot: 3
    scale: 1
    traj: 0
  save_dir: outputs/checkpoints/recurrent_steps_1
tracking:
  mlflow_enabled: true
  tracking_uri: null
  experiment_name: single_object_final
  run_name: exp13_recurrent_steps_1
